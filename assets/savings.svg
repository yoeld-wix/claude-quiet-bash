<svg width="1010" height="486" viewBox="0 0 1010 486" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Token savings per command">
  <style>
    .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
    .lbl { font-size: 13px; }
    .val { font-size: 12px; }
  </style>
  <defs>
    <linearGradient id="cost" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8836b"/>
      <stop offset="1" stop-color="#d1564b"/>
    </linearGradient>
  </defs>

  <text x="24" y="34" class="mono" font-size="22" font-weight="700" fill="#1fb588">536,957 → 250 tokens</text>
  <text x="24" y="58" class="mono" font-size="13" fill="#57606a">Each command's raw output vs. the ~25-token summary quiet-bash keeps — a 99.9% cut.</text>
  <text x="24" y="78" class="mono" font-size="11" fill="#8b949e">bar = raw tokens re-paid every turn · green cap = summary kept · * = modeled log</text>
  
  <text x="236" y="106" text-anchor="end" class="mono lbl" fill="#57606a">git diff HEAD~25..HEAD</text>
  <rect x="250" y="92" width="585" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="92" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="845" y="106" class="mono val" fill="#57606a">217k</text>
  <text x="236" y="140" text-anchor="end" class="mono lbl" fill="#57606a">git log --stat -150</text>
  <rect x="250" y="126" width="331" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="126" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="591" y="140" class="mono val" fill="#57606a">123k</text>
  <text x="236" y="174" text-anchor="end" class="mono lbl" fill="#57606a">git log -p -12</text>
  <rect x="250" y="160" width="122" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="160" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="382" y="174" class="mono val" fill="#57606a">45.2k</text>
  <text x="236" y="208" text-anchor="end" class="mono lbl" fill="#57606a">find (repo source files)</text>
  <rect x="250" y="194" width="116" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="194" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="376" y="208" class="mono val" fill="#57606a">42.9k</text>
  <text x="236" y="242" text-anchor="end" class="mono lbl" fill="#57606a">git log --oneline -1200</text>
  <rect x="250" y="228" width="108" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="228" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="368" y="242" class="mono val" fill="#57606a">39.9k</text>
  <text x="236" y="276" text-anchor="end" class="mono lbl" fill="#8b949e">yarn build  (turbo) *</text>
  <rect x="250" y="262" width="65" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="262" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="325" y="276" class="mono val" fill="#57606a">24.0k</text>
  <text x="236" y="310" text-anchor="end" class="mono lbl" fill="#8b949e">jest  (full suite) *</text>
  <rect x="250" y="296" width="38" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="296" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="298" y="310" class="mono val" fill="#57606a">14.1k</text>
  <text x="236" y="344" text-anchor="end" class="mono lbl" fill="#8b949e">yarn install *</text>
  <rect x="250" y="330" width="31" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="330" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="291" y="344" class="mono val" fill="#57606a">11.4k</text>
  <text x="236" y="378" text-anchor="end" class="mono lbl" fill="#8b949e">eslint + tsc *</text>
  <rect x="250" y="364" width="27" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="364" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="287" y="378" class="mono val" fill="#57606a">10.2k</text>
  <text x="236" y="412" text-anchor="end" class="mono lbl" fill="#8b949e">docker build *</text>
  <rect x="250" y="398" width="26" height="18" rx="4" fill="url(#cost)"/>
  <rect x="250" y="398" width="4" height="18" rx="2" fill="#1fb588"/>
  <text x="286" y="412" class="mono val" fill="#57606a">9.6k</text>
  <text x="24" y="468" class="mono" font-size="11" fill="#8b949e">Measured on a real monorepo via a 10-subagent benchmark · token estimate ≈ bytes / 4</text>
</svg>