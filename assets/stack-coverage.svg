<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16213a"/><stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="g-in" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6b0"/><stop offset="1" stop-color="#1fb588"/>
    </linearGradient>
    <linearGradient id="g-out" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(240,132,106,.55)"/><stop offset="1" stop-color="rgba(240,132,106,.9)"/>
    </linearGradient>
  </defs>
  <rect width="860" height="232" rx="16" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="859" height="231" rx="15.5" fill="none" stroke="rgba(148,163,184,.10)"/>

  <text x="36" y="46" fill="#e8eef7" font-size="23" font-weight="700">Input + output: they stack, not compete</text>
  <text x="36" y="70" fill="#8a99ad" font-size="13">One turn's token cost has two disjoint sources. Each tool attacks a different half — run both for full coverage.</text>

  <!-- the split bar: two halves of one cost -->
  <rect x="36" y="96" width="394" height="56" rx="9" fill="url(#g-in)"/>
  <rect x="434" y="96" width="390" height="56" rx="9" fill="url(#g-out)"/>

  <text x="233" y="122" text-anchor="middle" fill="#06251c" font-size="13.5" font-weight="800" letter-spacing="1.2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">INPUT</text>
  <text x="233" y="140" text-anchor="middle" fill="#06251c" font-size="11.5">what re-enters context</text>
  <text x="629" y="122" text-anchor="middle" fill="#2a0f08" font-size="13.5" font-weight="800" letter-spacing="1.2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OUTPUT</text>
  <text x="629" y="140" text-anchor="middle" fill="#2a0f08" font-size="11.5">code the model writes</text>

  <!-- who covers what -->
  <rect x="36" y="168" width="11" height="11" rx="3" fill="#1fb588"/>
  <text x="53" y="177" fill="#cbd5e1" font-size="12.5"><tspan font-weight="600" fill="#e8eef7">quiet-bash</tspan> — mechanical hooks/proxy, lossless. 90–99.9% per op (measured).</text>
  <rect x="36" y="192" width="11" height="11" rx="3" fill="#f0846a"/>
  <text x="53" y="201" fill="#cbd5e1" font-size="12.5"><tspan font-weight="600" fill="#e8eef7">Concise + minimal-change</tspan> (or <tspan font-weight="600" fill="#e8eef7">ponytail</tspan>) — behavioral, trims generated code/prose.</text>

  <text x="36" y="224" fill="#5b6b80" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Disjoint cost sources → installing both compounds. Full field map: docs/comparison.md</text>
</svg>
