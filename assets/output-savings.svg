<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 250" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16213a"/><stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(240,132,106,.45)"/><stop offset="1" stop-color="rgba(240,132,106,.85)"/>
    </linearGradient>
  </defs>
  <rect width="860" height="250" rx="16" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="859" height="249" rx="15.5" fill="none" stroke="rgba(148,163,184,.10)"/>

  <text x="36" y="46" fill="#e8eef7" font-size="23" font-weight="700">Output side — faster <tspan fill="#8a99ad" font-weight="400">&amp;</tspan> cheaper</text>
  <text x="824" y="42" text-anchor="end" fill="#f0846a" font-size="10.5" font-weight="700" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIRECTIONAL · LIVE A/B</text>
  <text x="36" y="70" fill="#8a99ad" font-size="13">The opt-in output levers. Noisy + task-dependent — bar = observed reduction, not a guarantee.</text>

  <!-- Response time -->
  <text x="36" y="112" fill="#e8eef7" font-size="14.5" font-weight="600">Response time<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Concise + minimal-change</tspan></text>
  <text x="824" y="112" text-anchor="end" fill="#f0846a" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−49%</text>
  <rect x="36" y="120" width="788" height="20" rx="6" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="121" width="386" height="18" rx="5" fill="url(#coral)"/>

  <!-- Code written -->
  <text x="36" y="166" fill="#e8eef7" font-size="14.5" font-weight="600">Code written<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">minimal-change skill</tspan></text>
  <text x="824" y="166" text-anchor="end" fill="#f0846a" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−45%</text>
  <rect x="36" y="174" width="788" height="20" rx="6" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="175" width="355" height="18" rx="5" fill="url(#coral)"/>

  <!-- Total tokens -->
  <text x="36" y="220" fill="#e8eef7" font-size="14.5" font-weight="600">Total tokens<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">on a coding turn</tspan></text>
  <text x="824" y="220" text-anchor="end" fill="#f0846a" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−16%</text>
  <rect x="36" y="228" width="788" height="20" rx="6" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="229" width="126" height="18" rx="5" fill="url(#coral)"/>
</svg>
