<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 392" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16213a"/><stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="kept" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6b0"/><stop offset="1" stop-color="#1fb588"/>
    </linearGradient>
    <linearGradient id="raw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(240,132,106,.16)"/><stop offset="1" stop-color="rgba(240,132,106,.32)"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="392" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="859" height="391" rx="15.5" fill="none" stroke="rgba(148,163,184,.10)"/>

  <text x="36" y="46" fill="#e8eef7" font-size="23" font-weight="700">Where the tokens go</text>
  <text x="36" y="70" fill="#8a99ad" font-size="13">Bar length = raw tokens re-sent into context · bright sliver = what survives. Measured on real files — bench/run.sh</text>

  <!-- legend -->
  <rect x="36" y="89" width="11" height="11" rx="3" fill="#1fb588"/>
  <text x="53" y="98" fill="#8a99ad" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">kept in context</text>
  <rect x="186" y="89" width="11" height="11" rx="3" fill="#f0846a"/>
  <text x="203" y="98" fill="#8a99ad" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">spilled to disk (removed from context)</text>

  <!-- Row 1: JSON -->
  <text x="36" y="134" fill="#e8eef7" font-size="14.5" font-weight="600">JSON read<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">package-lock.json · 652 KB</tspan></text>
  <text x="824" y="134" text-anchor="end" fill="#2ee6b0" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−99.3%</text>
  <rect x="36" y="142" width="788" height="28" rx="7" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="143" width="786" height="26" rx="6" fill="url(#raw)"/>
  <rect x="37" y="143" width="5" height="26" rx="3" fill="url(#kept)" filter="url(#glow)"/>
  <text x="824" y="190" text-anchor="end" fill="#8a99ad" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#e8eef7" font-weight="600">163,064</tspan> <tspan fill="#5b6b80">→</tspan> <tspan fill="#e8eef7" font-weight="600">1,062</tspan> tok</text>

  <!-- Row 2: Command output -->
  <text x="36" y="218" fill="#e8eef7" font-size="14.5" font-weight="600">Command output<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">git log -p -12</tspan></text>
  <text x="824" y="218" text-anchor="end" fill="#2ee6b0" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−99.9%</text>
  <rect x="36" y="226" width="788" height="28" rx="7" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="227" width="195" height="26" rx="6" fill="url(#raw)"/>
  <rect x="37" y="227" width="3" height="26" rx="2" fill="url(#kept)" filter="url(#glow)"/>
  <text x="824" y="274" text-anchor="end" fill="#8a99ad" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#e8eef7" font-weight="600">40,660</tspan> <tspan fill="#5b6b80">→</tspan> <tspan fill="#e8eef7" font-weight="600">21</tspan> tok</text>

  <!-- Row 3: Source outline -->
  <text x="36" y="302" fill="#e8eef7" font-size="14.5" font-weight="600">Source outline<tspan dx="10" font-size="12" font-weight="400" fill="#8a99ad" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">pr-review.ts · 4,032 lines</tspan></text>
  <text x="824" y="302" text-anchor="end" fill="#2ee6b0" font-size="17" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">−94.7%</text>
  <rect x="36" y="310" width="788" height="28" rx="7" fill="#0f1726" stroke="rgba(148,163,184,.12)"/>
  <rect x="37" y="311" width="195" height="26" rx="6" fill="url(#raw)"/>
  <rect x="37" y="311" width="10" height="26" rx="3" fill="url(#kept)" filter="url(#glow)"/>
  <text x="824" y="358" text-anchor="end" fill="#8a99ad" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#e8eef7" font-weight="600">40,627</tspan> <tspan fill="#5b6b80">→</tspan> <tspan fill="#e8eef7" font-weight="600">2,144</tspan> tok</text>

  <line x1="36" y1="372" x2="824" y2="372" stroke="rgba(148,163,184,.12)"/>
  <text x="36" y="386" fill="#5b6b80" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Total across these layers: 244,352 → 3,227 tok (−98.7%). Scale: full track = 163,064 tok.</text>
</svg>
